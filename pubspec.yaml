name: luna
description: Luna — приватный трекер менструального цикла. Все данные хранятся локально.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.2.1

  # Database (Drift = type-safe SQLite ORM)
  drift: ^2.32.0
  drift_flutter: ^0.3.0

  # Encryption & secure storage
  flutter_secure_storage: ^10.0.0
  encrypt: ^5.0.3
  pointycastle: ^3.9.1

  # Subscriptions (RevenueCat)
  purchases_flutter: ^9.13.1

  # Charts
  fl_chart: ^1.1.1

  # Localization & dates
  intl: ^0.20.2

  # Home screen widget
  home_widget: ^0.9.0

  # Background tasks
  workmanager: ^0.9.0+3

  # Biometric auth
  local_auth: ^3.0.1

  # Permissions
  permission_handler: ^12.0.1

  # Navigation
  go_router: ^17.1.0

  # Non-sensitive settings
  shared_preferences: ^2.5.4

  # UI
  flutter_svg: ^2.2.4
  gap: ^3.0.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Push notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  flutter_timezone: ^1.0.8

  # Hashing (PIN)
  crypto: ^3.0.6

  # Utilities
  uuid: ^4.5.3
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Drift code generation
  drift_dev: ^2.32.0
  build_runner: ^2.4.13

flutter:
  generate: true
